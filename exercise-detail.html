<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Exercise Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background:#F5FFF5;
        }

        .title{
            color:#006400;
            text-align:center;
            margin-top:30px;
            margin-bottom:20px;
        }

        .card{
            border:none;
            box-shadow:0 2px 6px rgba(0,0,0,.2);
            margin-bottom:20px;
        }

        video{
            width:100%;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div id="navbar"></div>

<main>

<div class="container">

    <a href="plan.html"
       class="btn btn-outline-success mt-4">

        ← Back To My Plan

    </a>

    <h1
        class="title"
        id="exerciseName">

    </h1>
    <div
    id="statusBox"
    class="text-center mb-4">

</div>

    <!-- VIDEO -->

    <div class="card">

        <div class="card-body">

            <video
                id="exerciseVideo"
                controls
                class="shadow rounded">

            </video>

        </div>

    </div>

    <!-- INFORMATION -->

    <div class="card">

        <div class="card-body">

            <h4>Exercise Information</h4>

            <p>

                <strong>Category:</strong>

                <span id="category"></span>

            </p>

            <p>

                <strong>Difficulty:</strong>

                <span id="difficulty"></span>

            </p>

            <p>

                <strong>Workout:</strong>

                <span id="workout"></span>

            </p>

            <p>

                <strong>Duration:</strong>

                <span id="duration"></span>

                seconds

            </p>

            <p>

                <strong>Description:</strong>

            </p>

            <p id="description"></p>

        </div>

    </div>

    <!-- STEPS -->

    <div class="card">

        <div class="card-body">

            <h4>Exercise Steps</h4>

            <ol id="steps"></ol>

        </div>

    </div>
<!-- TIMER -->

<div class="card">

    <div class="card-body text-center">

        <h4>Workout Timer</h4>

        <h1
            id="timerDisplay"
            class="display-3 text-success">

            00:00

        </h1>

        <p
            id="timerMessage"
            class="fw-bold mt-3">

        </p>

        <div class="progress mt-3 mb-3" style="height:25px;">

            <div
                id="timerProgress"
                class="progress-bar bg-success"
                style="width:100%;">

            </div>

        </div>

        <button
            class="btn btn-success"
            onclick="startTimer()">

            ▶ Start

        </button>

        <button
            class="btn btn-warning ms-2"
            onclick="pauseTimer()">

            ⏸ Pause

        </button>

        <button
            class="btn btn-secondary ms-2"
            onclick="resetTimer()">

            🔄 Reset

        </button>

        <hr>

        <button
            class="btn btn-primary btn-lg mt-3"
            onclick="completeExercise()">

            ✅ Complete Exercise

        </button>

    </div>

</div>
</div>

</main>

<footer>

<p>

© 2026 Group 3 | Fitness & Physiotherapy Exercise Planner

</p>

</footer>

<script src="plan.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const id = parseInt(params.get("id"));

const exercise = myPlan.find(function(ex){

    return ex.id === id;

});

if(!exercise){

    document.querySelector(".container").innerHTML = `

        <div class="alert alert-danger mt-5">

            Exercise not found.

        </div>

    `;

}

else{

    document.getElementById("exerciseName").textContent =
        exercise.name;
        if (exercise.completed) {

    document.getElementById("statusBox").innerHTML = `
        <div class="alert alert-success">

            <h5>✅ Exercise Completed</h5>

            <p class="mb-0">

                Completed on:
                ${exercise.dateCompleted}

            </p>

        </div>
    `;

}

else{

    document.getElementById("statusBox").innerHTML = `
        <div class="alert alert-warning">

            ⏳ Exercise Pending

        </div>
    `;

}

    document.getElementById("exerciseVideo").src =
        exercise.vid;

    document.getElementById("category").textContent =
        exercise.category;

    document.getElementById("difficulty").textContent =
        exercise.difficulty;

    document.getElementById("workout").textContent =
        exercise.reps + " reps × " +
        exercise.sets + " sets";

    document.getElementById("duration").textContent =
        exercise.duration;

    document.getElementById("description").textContent =
        exercise.description;

    document.getElementById("steps").innerHTML =
        exercise.steps
        .map(step => "<li>" + step + "</li>")
        .join("");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="colorblind.js"></script>

<script>

fetch("navbar.html")

.then(response => response.text())

.then(data=>{

    document.getElementById("navbar").innerHTML =
        data;

    applyColorBlindMode();

});
// --------------------
// TIMER
// --------------------

let totalSeconds = 0;
let remainingSeconds = 0;
let timer = null;

if (exercise) {

    totalSeconds = exercise.duration;

    remainingSeconds = totalSeconds;

    updateTimer();

}

function updateTimer() {

    let minutes = Math.floor(remainingSeconds / 60);

    let seconds = remainingSeconds % 60;

    document.getElementById("timerDisplay").textContent =

        String(minutes).padStart(2, "0")

        + ":"

        + String(seconds).padStart(2, "0");

    let percentage =

        (remainingSeconds / totalSeconds) * 100;

    document.getElementById("timerProgress").style.width =

        percentage + "%";

}

function startTimer() {

    if (timer !== null) {

        return;

    }
    document.getElementById("timerMessage").innerHTML = "";
    
    timer = setInterval(function () {

        if (remainingSeconds > 0) {

            remainingSeconds--;

            updateTimer();

        }

       else {

            clearInterval(timer);

            timer = null;

            document.getElementById("timerProgress")
                .classList.remove("bg-success");

            document.getElementById("timerProgress")
                .classList.add("bg-primary");

            document.getElementById("timerMessage").innerHTML =

            `
            <div class="alert alert-success">

                🎉 Great Job!

                Workout timer completed.

                You may now complete this exercise.

            </div>
            `;

        }

    }, 1000);

}

function pauseTimer() {

    clearInterval(timer);

    timer = null;

}

function resetTimer() {

    pauseTimer();

    remainingSeconds = totalSeconds;

    updateTimer();

    document.getElementById("timerProgress")
        .classList.remove("bg-primary");

    document.getElementById("timerProgress")
        .classList.add("bg-success");

    document.getElementById("timerMessage").innerHTML = "";

}
function completeExercise() {

    const selectedExercise = myPlan.find(function(ex) {

        return ex.id === id;

    });

    if (!selectedExercise) {

        return;

    }

    if (selectedExercise.completed) {

        alert("This exercise has already been completed.");

        return;

    }

    selectedExercise.completed = true;

    selectedExercise.dateCompleted =
        new Date().toLocaleDateString("en-GB");

    localStorage.setItem(
        "myPlan",
        JSON.stringify(myPlan)
    );

    alert("🎉 Exercise completed!");

    window.location.href = "plan.html";

}
</script>

</body>

</html>
