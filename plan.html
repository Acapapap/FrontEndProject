<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>My Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: #F5FFF5;
        }

        .title {
            color: #006400;
            text-align: center;
            margin-top: 30px;
        }

        .card {
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border: none;
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <main>
        <div class="container">

            <h1 class="title">My Exercise Plan</h1>

            <div id="planContainer"></div>

        </div>
    </main>

    <footer>
        <p>© 2026 Group 3 | Fitness & Physiotherapy Exercise Planner</p>
    </footer>

    <script src="plan.js"></script>

    <script>

        const container = document.getElementById("planContainer");

        if (myPlan.length === 0) {

            container.innerHTML = `
                <div class="alert alert-warning mt-4">
                    No exercises added yet.
                </div>
            `;

        }

        else {

            myPlan.forEach(function (ex) {

                container.innerHTML += `
                    <div class="card">
                        <div class="card-body">

                            <h5>
                                ${ex.name}

                                ${ex.completed
                                    ? '<span class="badge bg-success ms-2">Completed</span>'
                                    : '<span class="badge bg-warning text-dark ms-2">Pending</span>'
                                }

                            </h5>

                            <p>
                                <strong>Category:</strong>
                                ${ex.category}
                            </p>

                            <p>
                                <strong>Workout:</strong>
                                ${ex.reps} reps × ${ex.sets} sets
                            </p>

                            ${ex.completed && ex.dateCompleted ? `
                                <p>
                                    <strong>Date Completed:</strong>
                                    ${ex.dateCompleted}
                                </p>
                            ` : ''}

                            ${!ex.completed ? `
                                <button
                                    class="btn btn-success"
                                    onclick="startExercise(${ex.id})">

                                    Start Exercise

                                </button>
                            ` : `
                                <button
                                    class="btn btn-primary"
                                    onclick="startExercise(${ex.id})">

                                    View Exercise

                                </button>
                            `}

                            <button
                                class="btn btn-danger ms-2"
                                onclick="deleteExercise(${ex.id})">

                                Remove

                            </button>

                        </div>
                    </div>
                `;

            });

        }

        function startExercise(id) {

            window.location.href =
                "exercise-detail.html?id=" + id;

        }

        function markPlanCompleted(id) {

            const exercise = myPlan.find(function (ex) {
                return ex.id === id;
            });

            if (exercise) {

                exercise.completed = true;
                exercise.dateCompleted = new Date().toLocaleDateString("en-GB");

                localStorage.setItem(
                    "myPlan",
                    JSON.stringify(myPlan)
                );

                location.reload();

            }

        }

        function deleteExercise(id) {

            if (confirm("Remove this exercise from your plan?")) {

                removeFromPlan(id);

                location.reload();

            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="colorblind.js"></script>

    <script>
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
                applyColorBlindMode();
            });
    </script>

</body>

</html>
