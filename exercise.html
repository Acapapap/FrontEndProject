<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>Exercise Library</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 0px;
        background: #f5f5f5;
        margin: 0px;
      }

      h1 {
        color: #2a7a5a;
      }

      input,
      select {
        padding: 8px;
        margin: 5px;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 16px;
      }

      .card {
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 16px;
        width: 220px;
      }

      .card h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .card p {
        margin: 0 0 8px;
        font-size: 13px;
        color: #555;
      }

      .card button {
        padding: 6px 12px;
        cursor: pointer;
      }

      nav {
        background: #10898d;
        padding: 14px 24px;
        margin: 0;
        display: flex;
        align-items: center;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-right: 16px;
        font-size: 15px;
      }

      nav a:hover {
        text-decoration: underline;
      }

      .container {
        background: transparent;
        border: none;
        width: auto;
        padding: 0;
      }

      .content {
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <nav>
      <div class="container">
        <a href="index.html">Home</a>
      </div>
    </nav>

    <div class="content">
      <h1>Exercise Library</h1>

      <input
        type="text"
        id="search"
        placeholder="Search..."
        oninput="render()"
      />

      <select id="filter" onchange="render()">
        <option value="all">All categories</option>
        <option value="back pain">Back pain</option>
        <option value="knee pain">Knee pain</option>
        <option value="stretching">Stretching</option>
        <option value="muscle strength">Muscle strength</option>
      </select>

      <div class="grid" id="grid"></div>
    </div>

    <!-- Exercise View -->
    <div
      id="overlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
      "
    >
      <div
        style="
          background: white;
          margin: 60px auto;
          padding: 24px;
          max-width: 420px;
          border-radius: 8px;
        "
      >
        <h2 id="ex-name"></h2>
        <p id="ex-category"></p>
        <p id="ex-desc"></p>
        <ol id="ex-steps"></ol>

        <button onclick="document.getElementById('overlay').style.display='none'">
          Close
        </button>
      </div>
    </div>

    <script src="exercises.js"></script>
    <script src="plan.js"></script>

    <script>
      function render() {
        const query = document.getElementById("search").value.toLowerCase();
        const cat = document.getElementById("filter").value;

        let list = exercises;

        if (cat !== "all") {
          list = list.filter(e => e.category === cat);
        }

        if (query) {
          list = list.filter(e => e.name.toLowerCase().includes(query));
        }

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        list.forEach(ex => {
          grid.innerHTML += `
            <div class="card">
              <h3>${ex.name}</h3>
              <p>${ex.category} · ${ex.difficulty}</p>
              <p>${ex.reps} reps x ${ex.sets} sets</p>
              <button onclick="addToPlan(${ex.id})">Add to My Plan</button>
              <button onclick="openModal(${ex.id})">View Plan</button>
            </div>`;
        });
      }

      function openModal(id) {
        const ex = exercises.find(e => e.id === id);

        document.getElementById("ex-name").textContent = ex.name;
        document.getElementById("ex-category").textContent =
          "Category: " + ex.category + " | " + "Dificulty: " + ex.difficulty;
        document.getElementById("ex-desc").textContent = ex.description;
        document.getElementById("ex-steps").innerHTML = ex.steps
          .map(s => "<li>" + s + "</li>")
          .join("");

        document.getElementById("overlay").style.display = "block";
      }

      render();
    </script>
  </body>
</html>
