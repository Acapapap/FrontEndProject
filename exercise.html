<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Exercise Library</title>

    <style>
        body {
            background-color: #F5FFF5;
        }

        .navbar {
            background-color: #00D100;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .title {
            color: #006400;
            text-align: center;
            margin: 30px 0;
        }

        .card {
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: none;
        }

        .btn-green {
            background-color: #00D100;
            color: white;
            border: none;
        }

        .btn-green:hover {
            background-color: #006400;
            color: white;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .box {
            background: white;
            width: 500px;
            max-width: 90%;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
        }

        .colorblind {
            background-color: white;
            color: black;
        }

        .colorblind .navbar {
            background-color: #003366 !important;
        }

        .colorblind .title {
            color: black;
        }

        .colorblind .card {
            background-color: white;
            border: 3px solid black;
            color: black;
        }

        .colorblind input,
        .colorblind select {
            background-color: white;
            color: black;
            border: 2px solid black;
        }

        .colorblind .btn-green {
            background-color: #003366;
            color: white;
        }

        .colorblind .btn-outline-success {
            border: 2px solid black;
            color: black;
        }

        .colorblind #overlay {
            background-color: rgba(0,0,0,0.7);
        }

        .colorblind .box {
            border: 3px solid black;
            color: black;
        }

        .colorblind .btn-light {
            background-color: yellow;
            color: black;
            border: 2px solid black;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Title -->
    <div class="container">
        <h1 class="title">Exercise Library</h1>

        <!-- Search & Filter -->
        <div class="row mb-4">
            <div class="col-md-8">
                <input
                    type="text"
                    id="search"
                    class="form-control"
                    placeholder="Search exercise..."
                    oninput="render()">
            </div>

            <div class="col-md-4">
                <select id="filter" class="form-select" onchange="render()">
                    <option value="all">All Categories</option>
                    <option value="back pain">Back Pain</option>
                    <option value="knee pain">Knee Pain</option>
                    <option value="stretching">Stretching</option>
                    <option value="muscle strength">Muscle Strength</option>
                </select>
            </div>
        </div>

        <!-- Exercise Cards -->
        <div class="row" id="grid"></div>
    </div>

    <!-- Popup -->
    <div id="overlay">
        <div class="box">
            <h3 id="ex-name"></h3>

            <p id="ex-category"></p>

            <p id="ex-desc"></p>

            <h5>Steps</h5>
            <ol id="ex-steps"></ol>

            <button class="btn btn-secondary"
                onclick="document.getElementById('overlay').style.display='none'">
                Close
            </button>
        </div>
    </div>

    <script src="exercises.js"></script>
    <script src="plan.js"></script>
    <script src="colorblind.js"></script>

    <script>

        fetch("navbar.html")
          .then(response => response.text())
          .then(data => {
            document.getElementById("navbar").innerHTML = data;
            applyColorBlindMode();
          });

        function render() {

            const query = document
                .getElementById("search")
                .value
                .toLowerCase();

            const cat = document
                .getElementById("filter")
                .value;

            let list = exercises;

            if (cat !== "all") {
                list = list.filter(e => e.category === cat);
            }

            if (query) {
                list = list.filter(e =>
                    e.name.toLowerCase().includes(query)
                );
            }

            const grid = document.getElementById("grid");

            grid.innerHTML = "";

            list.forEach(ex => {

                grid.innerHTML += `
                <div class="col-md-4">

                    <div class="card">

                        <div class="card-body">

                            <h5 class="card-title">
                                ${ex.name}
                            </h5>

                            <p>
                                <strong>Category:</strong>
                                ${ex.category}
                            </p>

                            <p>
                                <strong>Difficulty:</strong>
                                ${ex.difficulty}
                            </p>

                            <p>
                                ${ex.reps} reps × ${ex.sets} sets
                            </p>

                            <button
                                class="btn btn-green"
                                onclick="addToPlan(${ex.id})">
                                Add To Plan
                            </button>

                            <button
                                class="btn btn-outline-success"
                                onclick="openModal(${ex.id})">
                                View
                            </button>

                        </div>

                    </div>

                </div>
                `;
            });
        }

        function openModal(id) {

            const ex = exercises.find(
                e => e.id === id
            );

            document.getElementById("ex-name").textContent =
                ex.name;

            document.getElementById("ex-category").textContent =
                "Category: " +
                ex.category +
                " | Difficulty: " +
                ex.difficulty;

            document.getElementById("ex-desc").textContent =
                ex.description;

            document.getElementById("ex-steps").innerHTML =
                ex.steps
                .map(step => "<li>" + step + "</li>")
                .join("");

            document.getElementById("overlay").style.display =
                "block";
        }

        render();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
