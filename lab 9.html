<!DOCTYPE html>
<html>
<head>
    <title>For Loop Example</title>
</head>
<body>

<h2>Count from 1 to 10 using for loop</h2>

<button onclick="countWithFor()">Start</button>

<script>
    function countWithFor() {
        for (let i = 1; i <= 10; i++) {
            alert("Number: " + i);
        }
    }
</script>

</body>
</html>
