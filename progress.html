<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<header>
    <h1>Progress Tracker</h1>
    <p>Track your exercise completion progress.</p>
</header>

<main class="container mt-4">

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Total Exercises</h5>
                    <h2 id="totalExercise">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Completed</h5>
                    <h2 id="completedExercise">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Remaining</h5>
                    <h2 id="remainingExercise">0</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <h4>Overall Progress</h4>

            <div class="progress mt-3">
                <div id="progressBar" class="progress-bar bg-success" style="width:0%">
                    0%
                </div>
            </div>

            <div id="progressMessage" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <h4>Exercise Status</h4>

            <table class="table table-striped mt-3">
                <thead>
                    <tr>
                        <th>Exercise</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="progressTable">
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-4 mb-4">
        <button class="btn btn-success" onclick="window.print()">
            Print Report
        </button>
    </div>

</main>

<footer>
    © 2026 JomFitness
</footer>

<script>
fetch("navbar.html")
.then(response => response.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

<script src="colorblind.js"></script>
<script src="progress.js"></script>

</body>
</html>
